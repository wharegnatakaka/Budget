name: budget
services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=budget_production
      - POSTGRES_USER=budget
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - db_data:/data/db
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://budget:${POSTGRES_PASSWORD}@postgres/budget_production
      - POCKETSMITH_API_KEY=${POCKETSMITH_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - NTFY_URL=${NTFY_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3001}
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: bundle exec rails solid_queue:start
    volumes:
      - db_data:/data/db
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://budget:${POSTGRES_PASSWORD}@postgres/budget_production
      - POCKETSMITH_API_KEY=${POCKETSMITH_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - NTFY_URL=${NTFY_URL}
    depends_on:
      - api
      - postgres
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - api
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.budget.entrypoints: https
      traefik.http.routers.budget.rule: Host(`budget.internal.wharengatakaka.nz`)
      traefik.http.routers.budget.tls: "true"
      traefik.http.services.budget.loadbalancer.server.port: "3001"
      # additions for Let's Encrypt
      traefik.http.routers.budget.tls.certresolver: letsencrypt
      traefik.http.routers.budget.middlewares: budget-headers
      # security headers
      traefik.http.middlewares.budget-headers.headers.customResponseHeaders.Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
      traefik.http.middlewares.budget-headers.headers.customResponseHeaders.X-Content-Type-Options: "nosniff"
      traefik.http.middlewares.budget-headers.headers.customResponseHeaders.X-Frame-Options: "SAMEORIGIN"
      traefik.http.middlewares.budget-headers.headers.customResponseHeaders.X-XSS-Protection: "1; mode=block"
      traefik.http.middlewares.budget-headers.headers.customResponseHeaders.Referrer-Policy: "strict-origin-when-cross-origin"

  # openclaw:
  #   build:
  #     context: ./openclaw
  #     dockerfile: Dockerfile
  #   volumes:
  #     - ./openclaw:/home/node/.openclaw
  #   environment:
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
  #     - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
  #     - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
  #     - PGPASSWORD=${POSTGRES_PASSWORD}
